name: API Tests (Docker)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the image. The dependency layer is cached between runs via
      # GitHub Actions cache, so subsequent builds only re-execute changed layers.
      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: api-portfolio:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Run the full test suite inside the built image.
      # Secrets are passed as environment variables, matching how BaseTest reads them.
      - name: Run tests inside container
        run: |
          docker run --rm \
            -e CAT_API_KEY=${{ secrets.CAT_API_KEY }} \
            -e GH_TOKEN=${{ secrets.GH_TOKEN }} \
            -v ${{ github.workspace }}/target:/app/target \
            api-portfolio:ci

      # Upload TestNG reports as a build artifact regardless of test outcome.
      - name: Upload TestNG reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-reports
          path: target/surefire-reports/
          retention-days: 14
